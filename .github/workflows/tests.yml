name: Tests

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov
    
    - name: Lint with syntax check
      run: |
        python -c "
        import sys, pathlib, py_compile, ast

        errors = []
        skip = {'.git', '__pycache__', '.pytest_cache', 'build', 'dist'}

        for f in pathlib.Path('.').rglob('*.py'):
            if any(p in f.parts for p in skip):
                continue
            try:
                py_compile.compile(str(f), doraise=True)
            except py_compile.PyCompileError as e:
                errors.append(str(e))
                print(f'FAIL: {f}  ->  {e}')

        if errors:
            print(f'\n{len(errors)} file(s) failed syntax check.')
            sys.exit(1)
        else:
            print(f'All .py files passed syntax check.')
        "
    
    - name: Run tests
      run: |
        pytest tests/ -v --tb=short --cov=winmerge_ai_exporter --cov-report=xml
    
    - name: Upload coverage
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'

  build:
    runs-on: windows-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    
    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
    
    - name: Sync VERSION with pushed tag
      shell: bash
      run: |
        # Tag is e.g. refs/tags/v1.3.3 -> VERSION file becomes "1.3.3"
        # Safety net for tags pushed manually (without deploy-local.sh/bat),
        # so the build always matches what the tag says, not a stale
        # VERSION file left over in the commit.
        TAG_VERSION="${GITHUB_REF#refs/tags/v}"
        echo "$TAG_VERSION" > VERSION
        echo "Building version: $TAG_VERSION"
    
    - name: Build distribution
      run: |
        .\build-release.bat
    
    - name: Upload Release Assets
      uses: softprops/action-gh-release@v1
      with:
        files: |
          release/*.zip
          dist/*.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
