name: CI / CD

on:
  push:
    branches: [ main, master, develop ]
    tags:     [ 'v*' ]
  pull_request:
    branches: [ main, master, develop ]

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 — test  (runs on every push / PR)
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  test:
    name: Test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v4
      with:
        # Need full history so the changelog job can read all commits
        fetch-depth: 0

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements-dev.txt') }}
        restore-keys: ${{ runner.os }}-pip-${{ matrix.python-version }}-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-dev.txt

    # Syntax check: compileall is cross-platform and needs no find/xargs
    - name: Syntax check
      run: python -m compileall -q -x "\.git|__pycache__|\.pytest_cache|build|dist|\.venv" .

    - name: Run tests
      run: pytest tests/ -v --tb=short --cov=winmerge_ai_exporter --cov-report=xml

    - name: Upload coverage
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 — changelog  (only on tag push)
#
# Reads all commits since the previous tag that follow Conventional Commits
# format (feat/fix/chore/docs/refactor/perf/test/ci/build) and writes
# CHANGELOG.md automatically.  The file is then committed back to the repo
# so the build job can bundle it into the release archive.
# ─────────────────────────────────────────────────────────────────────────────
  changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write        # needed to push the generated CHANGELOG.md

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0       # full history required to read commit log

    - name: Generate CHANGELOG.md from Conventional Commits
      shell: bash
      run: |
        TAG="${GITHUB_REF#refs/tags/}"         # e.g. v1.3.3
        VERSION="${TAG#v}"                      # e.g. 1.3.3
        DATE=$(date +%Y-%m-%d)

        # Find the previous tag (the one before this one)
        PREV_TAG=$(git tag --sort=-creatordate | grep -v "^${TAG}$" | head -1)

        if [ -z "$PREV_TAG" ]; then
          RANGE="HEAD"
          echo "No previous tag found — using full history"
        else
          RANGE="${PREV_TAG}..HEAD"
          echo "Generating changelog for ${PREV_TAG}..${TAG}"
        fi

        # Helper: extract commits of a given type
        get_section() {
          TYPE=$1
          git log "$RANGE" --pretty=format:"%s|%h" \
            | grep -E "^${TYPE}(\([^)]+\))?[!:]" \
            | sed 's/|/ (/' | sed 's/$/)/' \
            | sed 's/^/- /' || true
        }

        FEATS=$(get_section "feat")
        FIXES=$(get_section "fix")
        PERF=$(get_section "perf")
        REFACTORS=$(get_section "refactor")
        DOCS=$(get_section "docs")
        TESTS=$(get_section "test")
        CHORES=$(get_section "chore|build|ci")
        BREAKING=$(git log "$RANGE" --pretty=format:"%s|%h" | grep "BREAKING CHANGE\|!:" | sed 's/|/ (/' | sed 's/$/)/' | sed 's/^/- /' || true)

        # Build the new entry
        ENTRY="## [${VERSION}] — ${DATE}"$'\n'
        [ -n "$BREAKING" ] && ENTRY+=$'\n### ⚠️ Breaking Changes\n'"$BREAKING"$'\n'
        [ -n "$FEATS"    ] && ENTRY+=$'\n### ✨ Features\n'"$FEATS"$'\n'
        [ -n "$FIXES"    ] && ENTRY+=$'\n### 🐛 Bug Fixes\n'"$FIXES"$'\n'
        [ -n "$PERF"     ] && ENTRY+=$'\n### ⚡ Performance\n'"$PERF"$'\n'
        [ -n "$REFACTORS"] && ENTRY+=$'\n### ♻️ Refactors\n'"$REFACTORS"$'\n'
        [ -n "$DOCS"     ] && ENTRY+=$'\n### 📝 Docs\n'"$DOCS"$'\n'
        [ -n "$TESTS"    ] && ENTRY+=$'\n### 🧪 Tests\n'"$TESTS"$'\n'
        [ -n "$CHORES"   ] && ENTRY+=$'\n### 🔧 Chores / CI\n'"$CHORES"$'\n'

        # Prepend to existing CHANGELOG.md (or create it)
        HEADER="# Changelog"$'\n\n'"All notable changes to this project will be documented in this file."$'\n\n'
        if [ -f CHANGELOG.md ]; then
          # Strip the existing header so we don't duplicate it
          EXISTING=$(tail -n +3 CHANGELOG.md)
          printf '%s%s\n%s' "$HEADER" "$ENTRY" "$EXISTING" > CHANGELOG.md
        else
          printf '%s%s' "$HEADER" "$ENTRY" > CHANGELOG.md
        fi

        echo "Generated CHANGELOG.md:"
        head -30 CHANGELOG.md

    - name: Commit CHANGELOG.md back to repo
      shell: bash
      run: |
        TAG="${GITHUB_REF#refs/tags/}"
        git config user.name  "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add CHANGELOG.md
        git diff --cached --quiet && echo "No changes to commit" && exit 0
        git commit -m "docs(changelog): auto-generate for ${TAG} [skip ci]"
        # Push to the default branch (not the tag itself)
        git push origin HEAD:${{ github.event.repository.default_branch }}

# ─────────────────────────────────────────────────────────────────────────────
# JOB 3 — build  (only on tag push, after test + changelog)
#
# Packages the executables on Windows (the only platform we ship .exe from),
# bundles CHANGELOG.md into the release archive, then creates a GitHub
# Release with:
#   - Auto-generated release notes from Conventional Commits
#   - The .zip and .exe files as release assets
# ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build & Release
    runs-on: windows-latest
    needs: [ test, changelog ]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write        # needed to create GitHub Release

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        # Pull latest so we get the CHANGELOG.md commit from the changelog job
        ref: ${{ github.event.repository.default_branch }}

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install build tools
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller

    - name: Sync VERSION file with pushed tag
      shell: bash
      run: |
        TAG_VERSION="${GITHUB_REF#refs/tags/v}"
        echo "$TAG_VERSION" > VERSION
        echo "Building version: $TAG_VERSION"

    - name: Build executables
      run: .\build-release.bat

    # Create a GitHub Release with:
    #   - generate_release_notes: true  → GitHub parses Conventional Commits
    #     in the tag range and shows them as structured release notes
    #   - body_path: CHANGELOG.md excerpt for that version
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        generate_release_notes: true   # GitHub auto-parses Conventional Commits
        body_path: CHANGELOG.md        # also attach our own formatted changelog
        files: |
          release/*.zip
          dist/*.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
